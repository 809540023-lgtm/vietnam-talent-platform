# Render Blueprint - VietTalent Taiwan
services:
  - type: web
    name: viettalent-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: viettalent-db
          property: connectionString
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: GOOGLE_TRANSLATE_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0
    plan: free
    healthCheckPath: /api/health

  - type: worker
    name: viettalent-telegram-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: cd telegram-bot && python bot.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: viettalent-db
          property: connectionString
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: API_BASE_URL
        fromService:
          type: web
          name: viettalent-api
          envVarKey: RENDER_EXTERNAL_URL
    plan: free

databases:
  - name: viettalent-db
    plan: free
    databaseName: viettalent
