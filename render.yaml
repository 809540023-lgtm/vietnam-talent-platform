services:
  - type: web
    name: viettalent-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: GOOGLE_TRANSLATE_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: viettalent-db
          property: connectionString

databases:
  - name: viettalent-db
    plan: free
